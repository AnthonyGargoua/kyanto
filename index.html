<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKYJAP | Underground Tokyo Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-black" x-data="shop" x-init="init()" x-cloak>

    <div class="fixed bottom-5 right-5 z-[100]">
        <template x-if="notification">
            <div class="bg-black text-white px-6 py-4 font-bold shadow-2xl animate__animated animate__fadeInUp border-l-4 border-red-600" x-text="notification"></div>
        </template>
    </div>

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer" @click="page = 'home'">
                    <span class="logo-text text-3xl italic">ANKY<span class="japan-red">JAP</span></span>
                </div>

                <div class="hidden md:flex space-x-10 items-center">
                    <button @click="page = 'home'" :class="page === 'home' ? 'nav-active' : ''" class="nav-link">ACCUEIL</button>
                    <button @click="page = 'shop'" :class="page === 'shop' ? 'nav-active' : ''" class="nav-link">BOUTIQUE</button>
                    <button @click="page = 'drop'" :class="page === 'drop' ? 'text-red-600' : ''" class="nav-link flex items-center">
                        <span class="relative flex h-2 w-2 mr-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-red-600"></span>
                        </span>
                        NEXT DROP
                    </button>
                    <button @click="page = 'contact'" :class="page === 'contact' ? 'nav-active' : ''" class="nav-link">CONTACT</button>
                </div>

                <div class="flex items-center space-x-6">
                    <button @click="cartOpen = true" class="relative p-2 group">
                        <svg class="w-6 h-6 group-hover:text-red-600 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        <span class="cart-badge" x-text="cart.length"></span>
                    </button>
                    <button @click="mobileMenu = !mobileMenu" class="md:hidden">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div x-show="cartOpen" class="fixed inset-0 z-[60]" style="display: none;">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="cartOpen = false"></div>
        <div class="absolute inset-y-0 right-0 max-w-md w-full bg-white p-8 flex flex-col animate__animated animate__slideInRight">
            <div class="flex justify-between items-center border-b-2 border-black pb-4">
                <h2 class="text-2xl font-black">PANIER</h2>
                <button @click="cartOpen = false" class="text-4xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto py-6">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex items-center justify-between mb-6 border-b border-gray-100 pb-4">
                        <img :src="item.image" class="w-20 h-24 object-cover grayscale hover:grayscale-0 transition duration-500">
                        <div class="flex-1 px-4">
                            <p class="font-bold uppercase text-sm" x-text="item.name"></p>
                            <p class="text-red-600 font-bold" x-text="item.price + '€'"></p>
                        </div>
                        <button @click="removeFromCart(index)" class="text-xs font-bold hover:text-red-600 uppercase">Supprimer</button>
                    </div>
                </template>
            </div>
            <div class="pt-6 border-t-2 border-black">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span>TOTAL</span>
                    <span x-text="totalPrice() + '€'"></span>
                </div>
                <button class="w-full bg-black text-white py-5 font-bold hover:bg-red-600 transition tracking-[0.2em]">CHECKOUT</button>
            </div>
        </div>
    </div>

    <main>
        <div x-show="page === 'home'" class="animate__animated animate__fadeIn">
            <div class="hero-section">
                <div class="hero-overlay"></div>
                <div class="relative z-10 text-center text-white p-6">
                    <h1 class="text-7xl md:text-9xl font-black italic tracking-tighter mb-4 animate__animated animate__slideInDown">ANKYJAP</h1>
                    <p class="text-xl md:text-2xl font-light tracking-[0.4em] uppercase mb-10">Limited Streetwear Design</p>
                    <button @click="page = 'shop'" class="btn-primary">ENTRER DANS LE SHOP</button>
                </div>
            </div>
        </div>

        <div x-show="page === 'shop'" class="max-w-7xl mx-auto py-20 px-4 animate__animated animate__fadeIn">
            <div class="flex flex-col md:flex-row justify-between items-baseline mb-16 border-b-4 border-black pb-4">
                <h2 class="text-5xl font-black italic uppercase">Boutique</h2>
                <span class="text-gray-400 font-bold tracking-widest uppercase text-sm" x-text="products.length + ' PIÈCES DISPONIBLES'"></span>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <template x-for="product in products" :key="product.id">
                    <div class="product-card">
                        <div class="relative overflow-hidden aspect-[3/4] bg-gray-100 border-b border-gray-200">
                            <img :src="product.image" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110">
                            <button @click="addToCart(product)" class="add-to-cart-btn uppercase font-black italic">Ajouter</button>
                        </div>
                        <div class="p-4 bg-white">
                            <h3 class="font-black uppercase text-sm tracking-tighter mb-1" x-text="product.name"></h3>
                            <p class="text-red-600 font-bold" x-text="product.price + '€'"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="page === 'drop'" class="min-h-screen bg-black text-white flex flex-col items-center justify-center p-6 animate__animated animate__zoomIn">
            <h2 class="text-7xl md:text-[12rem] font-black italic tracking-tighter mb-6 leading-none">NEXT DROP</h2>
            <div class="flex space-x-6 md:space-x-12 text-center mb-16">
                <div><span class="text-5xl md:text-8xl font-black" x-text="countdown.d"></span><p class="text-red-600 font-bold text-xs">JOURS</p></div>
                <div class="text-5xl md:text-8xl font-black">:</div>
                <div><span class="text-5xl md:text-8xl font-black" x-text="countdown.h"></span><p class="text-red-600 font-bold text-xs">HEURES</p></div>
                <div class="text-5xl md:text-8xl font-black">:</div>
                <div><span class="text-5xl md:text-8xl font-black" x-text="countdown.m"></span><p class="text-red-600 font-bold text-xs">MINUTES</p></div>
            </div>
            <div class="max-w-md w-full border border-gray-800 p-8 text-center">
                <p class="mb-6 font-bold tracking-widest text-sm text-gray-400 uppercase">Inscrivez-vous pour l'accès prioritaire</p>
                <div class="flex flex-col space-y-4">
                    <input type="email" placeholder="EMAIL ADDRESS" class="bg-transparent border-b-2 border-gray-700 p-3 text-center outline-none focus:border-white transition">
                    <button class="bg-white text-black py-4 font-black hover:bg-red-600 hover:text-white transition uppercase">M'inscrire</button>
                </div>
            </div>
        </div>

        <div x-show="page === 'contact'" class="max-w-2xl mx-auto py-24 px-6 animate__animated animate__fadeIn">
            <h2 class="text-6xl font-black italic mb-12 border-b-4 border-black pb-4 uppercase">Contact</h2>
            <form class="space-y-8">
                <input type="text" placeholder="NOM COMPLET" class="form-input">
                <input type="email" placeholder="EMAIL" class="form-input">
                <textarea rows="5" placeholder="MESSAGE" class="form-input"></textarea>
                <button @click.prevent="showNotification('MESSAGE ENVOYÉ ⛩️')" class="w-full bg-black text-white py-5 font-black hover:bg-red-600 transition tracking-[0.3em]">ENVOYER</button>
            </form>
        </div>
    </main>

    <footer class="bg-black text-white py-20 px-6 text-center">
        <span class="text-4xl italic font-black mb-8 block tracking-tighter">ANKY<span class="text-red-600">JAP</span></span>
        <p class="text-gray-500 text-xs tracking-[0.5em] uppercase">Tokyo Underground Culture &copy; 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
