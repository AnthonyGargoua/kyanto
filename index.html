<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKYJAP | Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        [x-cloak] { display: none !important; }
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .marquee-container {
            display: flex;
            width: 200%;
            animation: marquee 20s linear infinite;
        }
    </style>
</head>
<body class="bg-white text-black font-sans overflow-x-hidden" x-data="shop" x-cloak>

    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-20 md:h-24 items-center">
            <div @click="page = 'home'; mobileMenu = false" class="cursor-pointer">
                <span class="text-2xl md:text-4xl font-black italic tracking-tighter">ANKY<span class="text-red-600">JAP</span></span>
            </div>
            
            <div class="hidden md:flex space-x-10 font-black text-xl tracking-widest uppercase">
                <button @click="page = 'home'" :class="page === 'home' ? 'text-red-600' : ''" class="hover:scale-110 transition">Accueil</button>
                <button @click="page = 'shop'" :class="page === 'shop' ? 'text-red-600' : ''" class="hover:scale-110 transition">Shop</button>
                <button @click="page = 'drop'" :class="page === 'drop' ? 'text-red-600' : ''" class="flex items-center hover:scale-110 transition">
                    <span class="w-3 h-3 bg-red-600 rounded-full mr-2 animate-ping"></span> DROP
                </button>
            </div>

            <div class="flex items-center space-x-4">
                <button @click="cartOpen = true" class="relative p-2">
                    <svg class="w-8 h-8 md:w-10 md:h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="absolute top-0 right-0 bg-red-600 text-white text-[10px] md:text-xs w-5 h-5 md:w-6 md:h-6 flex items-center justify-center rounded-full font-black" x-text="cart.length"></span>
                </button>
                
                <button @click="mobileMenu = !mobileMenu" class="md:hidden p-2 border-2 border-black">
                    <svg x-show="!mobileMenu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    <svg x-show="mobileMenu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

        <div x-show="mobileMenu" 
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0"
             class="md:hidden bg-white border-b-4 border-black p-4 space-y-4 font-black uppercase text-center text-xl tracking-widest">
            <button @click="page = 'home'; mobileMenu = false" class="block w-full py-2">Accueil</button>
            <button @click="page = 'shop'; mobileMenu = false" class="block w-full py-2 border-y border-gray-100">Shop</button>
            <button @click="page = 'drop'; mobileMenu = false" class="block w-full py-2 text-red-600 italic">★ Drop ★</button>
        </div>
    </nav>

    <main>
        <div x-show="page === 'home'" class="hero-section">
            <div class="text-center text-white px-4 z-10 w-full overflow-hidden">
                <h1 class="text-5xl sm:text-7xl md:text-[13rem] font-black italic leading-none animate__animated animate__fadeInDown">ANKYJAP</h1>
                <p class="text-sm md:text-3xl tracking-[0.3em] md:tracking-[0.8em] mt-4 uppercase font-bold">Sacred Streetwear</p>
                <button @click="page = 'shop'" class="mt-12 bg-red-600 text-white px-8 md:px-16 py-4 md:py-6 font-black hover:bg-white hover:text-black transition uppercase text-xs md:text-sm tracking-widest border-2 border-red-600">Enter the Shrine</button>
            </div>
        </div>

        <div x-show="page === 'shop'" class="max-w-7xl mx-auto py-12 md:py-20 px-4 animate__animated animate__fadeIn">
            <h2 class="text-4xl md:text-9xl font-black italic uppercase mb-8 md:mb-12 border-b-4 md:border-b-8 border-black">Store</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                <template x-for="product in products" :key="product.id">
                    <div class="border-2 border-black flex flex-col group bg-white">
                        <div class="relative overflow-hidden aspect-[3/4] bg-gray-100">
                            <img :src="product.image" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                            <button @click="addToCart(product)" class="absolute bottom-0 w-full bg-black text-white py-4 md:py-5 font-black text-xs uppercase md:translate-y-full md:group-hover:translate-y-0 transition">Add to Cart</button>
                        </div>
                        <div class="p-4 bg-white border-t-2 border-black">
                            <p class="font-black uppercase text-xs truncate" x-text="product.name"></p>
                            <p class="text-red-600 font-bold text-lg" x-text="product.price + '€'"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="page === 'drop'" class="min-h-screen bg-black text-white animate__animated animate__fadeIn flex flex-col">
            <div class="bg-red-600 py-3 md:py-4 overflow-hidden border-y-2 border-white">
                <div class="marquee-container font-black uppercase italic text-lg md:text-3xl tracking-tighter">
                    <span class="px-4">TEMPLE DROP // NO RESTOCK // SACRED SERIES // </span>
                    <span class="px-4">TEMPLE DROP // NO RESTOCK // SACRED SERIES // </span>
                </div>
            </div>

            <div class="flex-1 flex flex-col items-center justify-center py-12 px-4">
                <h2 class="hidden md:block text-[15vw] font-black italic leading-none text-white opacity-10 absolute">DROP</h2>
                
                <div class="flex space-x-3 md:space-x-16 text-center z-10">
                    <div><span class="text-4xl md:text-[10rem] font-black block" x-text="countdown.d"></span><p class="text-[8px] md:text-sm text-red-600 font-bold">JOURS</p></div>
                    <div class="text-4xl md:text-[10rem] font-black">:</div>
                    <div><span class="text-4xl md:text-[10rem] font-black block" x-text="countdown.h"></span><p class="text-[8px] md:text-sm text-red-600 font-bold">HEURES</p></div>
                    <div class="text-4xl md:text-[10rem] font-black">:</div>
                    <div><span class="text-4xl md:text-[10rem] font-black block" x-text="countdown.m"></span><p class="text-[8px] md:text-sm text-red-600 font-bold">MINS</p></div>
                </div>

                <div class="max-w-2xl w-full px-4 text-center z-10 mt-12">
                    <template x-if="!mailSubmitted">
                        <div class="animate__animated animate__fadeInUp">
                            <p class="text-[10px] md:text-sm tracking-[0.3em] md:tracking-[0.5em] text-gray-400 mb-6 uppercase italic font-bold">Inscris-toi pour recevoir le sceau d'accès</p>
                            <div class="flex flex-col md:flex-row border-2 md:border-4 border-white">
                                <input x-model="email" type="email" placeholder="TON EMAIL" class="flex-1 bg-transparent p-4 md:p-6 text-white outline-none font-bold text-base md:text-lg uppercase">
                                <button @click="submitMail()" class="bg-white text-black px-10 py-4 md:py-6 font-black hover:bg-red-600 hover:text-white transition uppercase text-lg">Rejoindre</button>
                            </div>
                        </div>
                    </template>
                    
                    <template x-if="mailSubmitted">
                        <div class="animate__animated animate__zoomIn bg-red-600 p-6 md:p-12 border-4 border-white">
                            <h3 class="text-xl md:text-4xl font-black italic uppercase mb-2">INSCRIPTION VALIDÉE ⛩️</h3>
                            <p class="text-white font-bold tracking-widest uppercase text-[10px] md:text-sm">Vérifie tes messages, le temple va ouvrir.</p>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </main>

    <div x-show="cartOpen" class="fixed inset-0 z-[60]" style="display: none;">
        <div class="absolute inset-0 bg-black/90" @click="cartOpen = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:max-w-md bg-white p-6 md:p-8 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-8 border-b-4 border-black pb-4">
                <h2 class="text-3xl font-black italic">PANIER</h2>
                <button @click="cartOpen = false" class="text-4xl font-light">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto">
                <template x-if="cart.length === 0">
                    <p class="text-center italic text-gray-400 mt-10">Le temple est vide...</p>
                </template>
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex items-center space-x-4 mb-6 pb-4 border-b">
                        <img :src="item.image" class="w-16 h-20 object-cover border-2 border-black">
                        <div class="flex-1">
                            <p class="font-black text-xs uppercase" x-text="item.name"></p>
                            <p class="text-red-600 font-bold" x-text="item.price + '€'"></p>
                        </div>
                        <button @click="removeFromCart(index)" class="text-[10px] font-black underline hover:text-red-600">SUPPRIMER</button>
                    </div>
                </template>
            </div>
            <div class="pt-6 border-t-4 border-black mt-auto">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span>TOTAL</span>
                    <span x-text="totalPrice() + '€'"></span>
                </div>
                <button class="w-full bg-black text-white py-5 font-black hover:bg-red-600 transition tracking-widest">COMMANDER</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('shop', () => ({
                page: 'home',
                cartOpen: false,
                mobileMenu: false,
                email: '',
                mailSubmitted: false,
                cart: [],
                products: [
                    { id: 1, name: 'Katana Tee - Black', price: 45, image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&q=80' },
                    { id: 2, name: 'Tokyo Hoodie', price: 85, image: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80' },
                    { id: 3, name: 'Shinobi Pants', price: 110, image: 'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&q=80' },
                    { id: 4, name: 'Sacred Cap', price: 35, image: 'https://images.unsplash.com/photo-1588850561407-ed78c282e89b?auto=format&fit=crop&q=80' }
                ],
                countdown: { d: '00', h: '00', m: '00' },
                init() {
                    this.updateCountdown();
                    setInterval(() => this.updateCountdown(), 60000);
                },
                addToCart(p) {
                    this.cart.push(p);
                    this.cartOpen = true;
                },
                removeFromCart(index) {
                    this.cart.splice(index, 1);
                },
                totalPrice() {
                    return this.cart.reduce((sum, item) => sum + item.price, 0);
                },
                submitMail() {
                    if(this.email.includes('@')) this.mailSubmitted = true;
                },
                updateCountdown() {
                    // Simplement pour l'exemple
                    this.countdown = { d: '03', h: '12', m: '45' };
                }
            }))
        })
    </script>
</body>
</html>
