<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKYJAP | Katana Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-black" x-data="shop" @mousemove="moveCursor($event)">

    <div id="custom-cursor" class="hidden lg:block">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 90L90 10M85 5L95 15L90 10M15 95L5 85L10 90" stroke="#BC002D" stroke-width="6" stroke-linecap="round"/>
            <rect x="12" y="75" width="15" height="5" transform="rotate(-45 12 75)" fill="black"/>
        </svg>
    </div>

    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 md:h-24 items-center">
            <div @click="page = 'home'" class="cursor-pointer">
                <span class="text-2xl md:text-4xl font-black italic">ANKY<span class="text-red-600">JAP</span></span>
            </div>
            
            <div class="hidden md:flex space-x-8 font-black text-[10px] tracking-widest uppercase">
                <button @click="page = 'home'" :class="page === 'home' ? 'text-red-600' : ''" class="nav-link">Home</button>
                <button @click="page = 'shop'" :class="page === 'shop' ? 'text-red-600' : ''" class="nav-link">Shop</button>
                <button @click="page = 'drop'" :class="page === 'drop' ? 'text-red-600' : ''" class="nav-link">Drop</button>
            </div>

            <button @click="cartOpen = true" class="relative">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-black" x-text="cart.length"></span>
            </button>
        </div>
    </nav>

    <main>
        <section x-show="page === 'home'" class="hero-section">
            <div class="text-center text-white p-4">
                <h1 class="hero-title font-black italic animate__animated animate__zoomIn">ANKYJAP</h1>
                <p class="text-sm md:text-xl tracking-[0.5em] mt-4 opacity-80 uppercase">The Art of Streetwear</p>
                <button @click="page = 'shop'" class="mt-10 bg-red-600 text-white px-10 py-4 font-black hover:bg-white hover:text-black transition uppercase">Enter Shop</button>
            </div>
        </section>

        <section x-show="page === 'shop'" class="max-w-7xl mx-auto py-12 px-4 animate__animated animate__fadeIn">
            <h2 class="text-4xl md:text-7xl font-black italic uppercase mb-10 md:mb-20">Store</h2>
            <div class="product-grid">
                <template x-for="product in products" :key="product.id">
                    <div class="border-2 border-black flex flex-col">
                        <div class="relative overflow-hidden aspect-[3/4] bg-gray-100 border-b-2 border-black">
                            <img :src="product.image" class="w-full h-full object-cover">
                            <button @click="addToCart(product)" class="absolute bottom-0 w-full bg-black text-white py-3 font-black text-xs uppercase">Add to Cart</button>
                        </div>
                        <div class="p-3 bg-white">
                            <p class="font-black uppercase text-[10px] md:text-xs truncate" x-text="product.name"></p>
                            <p class="text-red-600 font-bold text-sm" x-text="product.price + '€'"></p>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section x-show="page === 'drop'" class="min-h-[90vh] bg-black text-white flex flex-col items-center justify-center px-4 overflow-hidden">
            <h2 class="drop-title font-black italic text-red-600 animate__animated animate__pulse animate__infinite">DROP</h2>
            
            <div class="grid grid-cols-4 md:flex md:space-x-12 text-center mt-10 w-full max-w-4xl">
                <div><span class="text-3xl md:text-8xl font-black block" x-text="countdown.d"></span><p class="text-[8px] md:text-xs text-gray-500 uppercase">Days</p></div>
                <div><span class="text-3xl md:text-8xl font-black block" x-text="countdown.h"></span><p class="text-[8px] md:text-xs text-gray-500 uppercase">Hours</p></div>
                <div><span class="text-3xl md:text-8xl font-black block" x-text="countdown.m"></span><p class="text-[8px] md:text-xs text-gray-500 uppercase">Mins</p></div>
                <div><span class="text-3xl md:text-8xl font-black block" x-text="countdown.s"></span><p class="text-[8px] md:text-xs text-gray-500 uppercase">Secs</p></div>
            </div>
            <p class="mt-12 tracking-[0.5em] text-[10px] md:text-sm text-gray-400 uppercase text-center italic">Ready your steel for the next drop</p>
        </section>
    </main>

    <div x-show="cartOpen" class="fixed inset-0 z-[60]" x-cloak>
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" @click="cartOpen = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:max-w-md bg-white p-6 md:p-10 flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic">CART</h2>
                <button @click="cartOpen = false" class="text-5xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex items-center space-x-4 mb-6 border-b pb-4">
                        <img :src="item.image" class="w-16 h-20 object-cover border-2 border-black">
                        <div class="flex-1">
                            <p class="font-black text-xs uppercase" x-text="item.name"></p>
                            <p class="text-red-600 font-bold" x-text="item.price + '€'"></p>
                        </div>
                        <button @click="removeFromCart(index)" class="text-[10px] font-black underline">REMOVE</button>
                    </div>
                </template>
            </div>
            <div class="border-t-4 border-black pt-6">
                <div class="flex justify-between text-2xl font-black mb-6 italic"><span>TOTAL</span><span x-text="totalPrice() + '€'"></span></div>
                <button class="w-full bg-black text-white py-5 font-black hover:bg-red-600 transition tracking-widest">CHECKOUT</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
